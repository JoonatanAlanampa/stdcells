name: harden

on:
  push:
    paths:
      - "harden/**"
      - "out/own.lef"
      - "out/own_hardening.lib"
      - "out/own_cells.gds"
      - ".github/workflows/harden.yml"
  workflow_dispatch:

jobs:
  pnr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache sky130 PDK
        uses: actions/cache@v4
        with:
          path: pdk-root
          key: pdk-sky130-${{ runner.os }}-v1

      # JS actions cannot run inside the nix-based librelane container
      # (the runner-injected node binary fails to exec there), so the
      # image is used via explicit docker run instead of `container:`.
      - name: Harden CORDIC-1 with the hybrid library
        run: |
          mkdir -p pdk-root
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e PDK_ROOT=/work/pdk-root \
            ghcr.io/librelane/librelane:3.0.5 \
            librelane harden/config.json

      # Signoff = the official KLayout deck. The magic/netgen checkers are
      # demoted to warnings in config.json: magic's CIF read of GDS-only
      # custom cells produces tens of thousands of phantom errors (the same
      # layout is clean under the official KLayout deck), and netgen LVS
      # depends on that same magic extraction. Cell-level LVS is done with
      # the PDK's KLayout deck in flow/run_lvs_all.py.
      - name: hvtp corner healing + KLayout signoff DRC
        run: |
          sudo chown -R "$USER" harden/runs || true
          GDS=$(ls harden/runs/*/final/gds/*.gds | sort | tail -1)
          RUNDIR=$(dirname "$(dirname "$(dirname "$GDS")")")
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e PDK_ROOT=/work/pdk-root \
            --entrypoint bash \
            ghcr.io/librelane/librelane:3.0.5 \
            -c "set -e
                klayout -b -r flow/heal_hvtp.py \
                  -rd input=$GDS -rd output=$RUNDIR/final/gds/healed.gds
                klayout -b -r /work/pdk-root/sky130A/libs.tech/klayout/drc/sky130A_mr.drc \
                  -rd input=$RUNDIR/final/gds/healed.gds \
                  -rd report=$RUNDIR/final/signoff_drc.lyrdb \
                  -rd feol=true -rd beol=true -rd offgrid=true"
          python3 - "$RUNDIR/final/signoff_drc.lyrdb" << 'EOF'
          import sys, xml.etree.ElementTree as ET
          from collections import Counter
          items = ET.parse(sys.argv[1]).getroot().findall(".//item")
          cats = Counter(i.findtext("category", "").strip("'") for i in items)
          print(f"signoff DRC violations: {len(items)}")
          for c, n in cats.most_common():
              print(f"  {c}: {n}")
          sys.exit(1 if items else 0)
          EOF

      - name: Report metrics
        if: always()
        run: |
          sudo chown -R "$USER" harden/runs || true
          python3 - << 'EOF'
          import glob, json, os
          runs = sorted(glob.glob("harden/runs/*/final/metrics.json"))
          if not runs:
              print("no metrics.json found"); raise SystemExit(0)
          m = json.load(open(runs[-1]))
          keys = [k for k in m if any(s in k for s in
                  ("design__instance", "utilization", "die__area",
                   "core__area", "timing__setup__ws", "timing__hold__ws",
                   "clock__skew", "route__wirelength", "antenna",
                   "power__total"))]
          lines = ["# Hybrid hardening metrics", ""]
          for k in sorted(keys):
              lines.append(f"- `{k}`: {m[k]}")
          out = "\n".join(lines)
          print(out)
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"),
                    "a") as f:
              f.write(out + "\n")
          EOF

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-run
          path: |
            harden/runs/*/final
            harden/runs/*/error.log
          if-no-files-found: warn
